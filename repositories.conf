## 第三方插件源（置顶，必须放在官方源上方）
src/gz passwall https://opkg.immortalwrt.org/releases/packages-25.12/aarch64_cortex-a53/passwall
src/gz luci https://opkg.immortalwrt.org/releases/packages-25.12/aarch64_cortex-a53/luci

# 本地插件目录，不可删除
src imagebuilder file:packages

# rockchip armv8 平台核心软件包（官方源）
src/gz openwrt_core https://archive.openwrt.org/releases/25.12.4/targets/rockchip/armv8/packages

# aarch64_cortex-a53 通用基础源（官方源）
src/gz openwrt_base https://archive.openwrt.org/releases/25.12.4/packages/aarch64_cortex-a53/base
src/gz openwrt_luci https://archive.openwrt.org/releases/25.12.4/packages/aarch64_cortex-a53/luci
src/gz openwrt_packages https://archive.openwrt.org/releases/25.12.4/packages/aarch64_cortex-a53/packages
src/gz openwrt_routing https://archive.openwrt.org/releases/25.12.4/packages/aarch64_cortex-a53/routing
src/gz openwrt_telephony https://archive.openwrt.org/releases/25.12.4/packages/aarch64_cortex-a53/telephony

# 关闭opkg签名校验，适配第三方插件
option check_signature 0
