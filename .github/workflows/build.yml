name: Build OpenWrt HINLINK_H28K 25.12.1 dllkids源
on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  RELEASE_VER: 25.12.1
  TARGET: rockchip
  SUBTARGET: armv8
  PROFILE: hinlink_h28k
  ROOTFS_SIZE: 800
  EXTRA_IMG_NAME: H28K-25.12.1-dllkids-OC-Lucky
  IB_URL: https://archive.openwrt.org/releases/25.12.1/targets/rockchip/armv8/openwrt-imagebuilder-25.12.1-rockchip-armv8.Linux-x86_64.tar.zst

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取仓库自定义文件
        uses: actions/checkout@v4

      - name: 安装全套编译依赖（含zstd）
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 python3-distutils zstd

      - name: 下载25.12.1 IB压缩包
        run: |
          wget --tries=5 --timeout=60 -L ${{ env.IB_URL }} -O ib.tar.zst
          file ib.tar.zst | grep -q "Zstandard compressed data" || (echo 压缩包损坏 && exit 1)
          mkdir ib-root
          tar -I zstd -xf ib.tar.zst -C ib-root --strip-components=1
          cd ib-root && ls -la

      - name: 查看支持设备列表
        run: cd ib-root && make info

      - name: 导入配置+替换dllkids软件源
        run: |
          cd ib-root
          cp $GITHUB_WORKSPACE/repositories.conf ./repositories.conf
          cp -r $GITHUB_WORKSPACE/files ./ || true
          mkdir -p packages
          cp -r $GITHUB_WORKSPACE/custom-packages/* packages/ || true

      # 【修复】使用IB标准make opkg调用，不再直接调用./bin/opkg
      - name: 刷新软件源索引并检索插件
        run: |
          cd ib-root
          ls -la
          # 更新软件源索引
          make OPKG_ARGS="update" opkg
          # 检索插件是否存在
          echo "=== 查找luci-app-openclash ==="
          make OPKG_ARGS="find luci-app-openclash" opkg
          echo "=== 查找luci-app-lucky ==="
          make OPKG_ARGS="find luci-app-lucky" opkg

      - name: 编译固件（内置OpenClash+Lucky）
        run: |
          cd ib-root
          make image \
            PROFILE=${{ env.PROFILE }} \
            PACKAGES="\
              luci luci-i18n-base-zh-cn \
              nano curl openssh-sftp-server shadow sudo \
              luci-app-openclash luci-app-lucky \
              -ppp -ppp-mod-pppoe -odhcp6c -kmod-ipv6 -ip6tables \
            " \
            FILES="./files" \
            DISABLED_SERVICES="dnsmasq odhcpd" \
            ROOTFS_SIZE=${{ env.ROOTFS_SIZE }} \
            EXTRA_IMAGE_NAME=${{ env.EXTRA_IMG_NAME }}

      - name: 整理固件产物
        run: |
          mkdir -p firmware-output
          mv ib-root/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*-sysupgrade.img.gz firmware-output/ || true
          mv ib-root/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*-factory.img.gz firmware-output/ || true
          ls -lh firmware-output

      - name: 上传固件制品
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-H28K-25.12.1-Firmware
          path: firmware-output
          retention-days: 30
