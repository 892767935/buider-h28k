name: Build H28K 25.12.4 ImageBuilder
on:
  workflow_dispatch:
  push:
    branches: main

env:
  RELEASE_VER: 25.12.4
  TARGET: rockchip
  SUBTARGET: armv8
  PROFILE: hilink-h28k
  ROOTFS_SIZE: 800
  EXTRA_NAME: H28K-25.12.4-Custom
  # 清华镜像IB下载地址
  IB_URL: https://archive.openwrt.org/releases/25.12.4/targets/rockchip/armv8/openwrt-imagebuilder-rockchip-armv8.Linux-x86_64.tar.xz

jobs:
  build-firmware:
    runs-on: ubuntu-22.04
    steps:
      - name: 拉取仓库自定义文件
        uses: actions/checkout@v4

      - name: 安装 ImageBuilder 依赖
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 python3-distutils

      - name: 下载官方 25.12.4 ImageBuilder
        run: |
          wget ${{ env.IB_URL }} -O ib.tar.xz
          mkdir ib-root
          tar -Jxf ib.tar.xz -C ib-root --strip-components=1
          cd ib-root
          ls -la

      - name: 替换软件源、导入自定义文件
        run: |
          cd ib-root
          # 覆盖仓库内的 repositories.conf
          cp $GITHUB_WORKSPACE/repositories.conf ./repositories.conf
          # 拷贝自定义配置目录 files
          cp -r $GITHUB_WORKSPACE/files ./ || true
          # 拷贝本地自定义ipk包
          mkdir -p packages
          cp -r $GITHUB_WORKSPACE/custom-packages/* packages/ || true

      - name: 打包自定义固件 ImageBuilder
        run: |
          cd ib-root
          make image \
            PROFILE=${{ env.PROFILE }} \
            PACKAGES="\
              luci luci-i18n-base-zh-cn luci-theme-argon luci-app-argon-config \
              luci-app-passwall2 luci-i18n-passwall2-zh-cn \
              nano curl openssh-sftp-server shadow sudo \
              -ppp -ppp-mod-pppoe -odhcp6c -kmod-ipv6 -ip6tables \
            " \
            FILES="./files" \
            DISABLED_SERVICES="dnsmasq odhcpd" \
            ROOTFS_PARTSIZE=${{ env.ROOTFS_SIZE }} \
            EXTRA_IMAGE_NAME=${{ env.EXTRA_NAME }}

      - name: 整理固件
        run: |
          mkdir output
          mv ib-root/bin/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/*.bin output/
          ls output

      - name: 上传固件制品
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-H28K-25.12.4-Firmware
          path: output
          retention-days: 30
